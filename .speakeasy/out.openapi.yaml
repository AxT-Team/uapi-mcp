  /image/frombase64:
    post:
      tags:
        - Image
      summary: 通过Base64编码上传图片
      description: >-
        当你需要在前端处理完图片（比如裁剪、加滤镜后），不通过传统表单，而是直接上传图片的场景，这个接口就派上用场了。


        ## 功能概述

        你只需要将图片的 Base64 编码字符串发送过来，我们就会把它解码、保存为图片文件，并返回一个可供访问的公开 URL。


        ## 使用须知


        > [!IMPORTANT]

        > **关于 `imageData` 格式**

        > 你发送的 `imageData` 字符串必须是完整的 Base64 Data URI 格式，它需要包含 MIME 类型信息，例如 `data:image/png;base64,iVBORw0KGgo...`。缺少 `data:image/...;base64,` 前缀将导致解码失败。
      operationId: post-image-frombase64
      parameters: []
      responses:
        "200":
          description: 上传成功！返回图片的访问地址。
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_url:
                    type: string
                    description: 图片保存后在服务器上的绝对访问URL。
                    example: https://uapis.cn/static/uploads/91e42db1c66c0b276abf6234dc50b2eb.png
                  msg:
                    type: string
                    description: 操作结果描述。
                    example: success
        "400":
          description: 请求失败。可能的原因有：请求体不是有效的JSON，缺少 `imageData` 字段，或者 `imageData` 的内容不是有效的Base64 Data URI。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INVALID_ARGUMENT
                  details:
                    type: object
                  message:
                    type: string
                    example: Invalid request body or imageData.
        "500":
          description: 服务器内部错误。在解码或保存图片文件时发生了未知错误。请稍后重试。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INTERNAL_SERVER_ERROR
                  details:
                    type: object
                  message:
                    type: string
                    example: Failed to save the image.
      requestBody:
        description: 一个JSON对象，包含 `imageData` 字段，其值为你想要上传图片的完整Base64 Data URI。
        required: true
        content:
          application/json:
            schema:
              required:
                - imageData
              type: object
              properties:
                imageData:
                  type: string
                  description: 图片的Base64 Data URI，必须包含MIME类型头。例如：`data:image/png;base64,...`
                  example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=
      x-search-words:
