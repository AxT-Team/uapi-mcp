          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: 错误描述
                    example: Translation service unavailable
                  code:
                    type: string
                    example: SERVICE_ERROR
      requestBody:
        description: 包含翻译参数的JSON对象
        required: true
        content:
          application/json:
            schema:
              required:
                - query
                - to_lang
              type: object
              properties:
                query:
                  type: string
                  description: 待翻译的文本内容
                  example: Hello, how are you?
                to_lang:
                  type: string
                  description: 目标语言，支持：中文、英文
                  enum:
