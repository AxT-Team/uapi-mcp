  /misc/randomnumber:
    get:
      tags:
        - Misc
      summary: 随机数生成
      description: >-
        需要一个简单的随机数，还是需要一串不重复的、带小数的随机数？这个接口都能满足你！


        ## 功能概述

        这是一个强大的随机数生成器。你可以指定生成的范围（最大/最小值）、数量、是否允许重复、以及是否生成小数（并指定小数位数）。


        ## 流程图

        ```mermaid

        graph TD


            A[开始] --> B{参数校验};
            B --> |通过| C{是否允许小数?};
            C --> |是| D[生成随机小数];
            C --> |否| E[生成随机整数];
            D --> F{是否允许重复?};
            E --> F;
            F --> |是| G[直接生成指定数量];
            F --> |否| H[生成不重复的数字];
            G --> I[返回结果];
            H --> I;
            B --> |失败| J[返回 400 错误];
        ```

        ## 使用须知

        > [!WARNING]

        > **不重复生成的逻辑限制**

        > 当设置 `allow_repeat=false` 时，请确保取值范围 `(max - min + 1)` 大于或等于你请求的数量 `count`。否则，系统将无法生成足够的不重复数字，请求会失败并返回 400 错误。
      operationId: get-misc-randomnumber
      parameters:
        - name: min
          in: query
          required: false
          description: 生成随机数的最小值（包含）。
          schema:
            type: integer
            default: 1
            example: 10
          x-tooltip: 默认为 1。
        - name: max
          in: query
          required: false
          description: 生成随机数的最大值（包含）。
          schema:
            type: integer
            default: 100
            example: 50
          x-tooltip: 默认为 100。
        - name: count
          in: query
          required: false
          description: 需要生成的随机数的数量。
          schema:
            type: integer
            default: 1
            example: 5
          x-tooltip: 默认为 1。
        - name: allow_repeat
          in: query
          required: false
          description: 是否允许生成的多个数字中出现重复值。
          schema:
            type: boolean
            default: false
            example: true
          x-tooltip: 默认为 false (不重复)。
        - name: allow_decimal
          in: query
          required: false
          description: 是否生成小（浮点）数。如果为 false，则只生成整数。
          schema:
            type: boolean
            default: false
            example: true
          x-tooltip: 默认为 false (整数)。
        - name: decimal_places
          in: query
          required: false
          description: 如果 `allow_decimal=true`，这里可以指定小数的位数。
          schema:
            type: integer
            default: 2
            example: 2
          x-tooltip: 仅在 allow_decimal=true 时生效。
      responses:
        "200":
          description: 生成成功！返回一个包含随机数的数组。
          content:
            application/json:
              schema:
                type: object
                properties:
                  numbers:
                    type: array
                    description: 生成的随机数列表。
                    items:
                      type: number
                    example:
                      - 42
                      - 8
                      - 77
        "400":
          description: 请求参数无效。例如，`min` 大于 `max`，或者在不允许重复的情况下，请求的数量大于可能生成的数字总数。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INVALID_ARGUMENT
                  details:
                    type: object
                  message:
                    type: string
                    example: Invalid parameters. 'min' cannot be greater than 'max'.
      x-search-words:
        - 随机数
        - 生成
        - 整数
        - 小数
        - random
        - number
        - generator
        - int
        - float
        - 抽奖
        - 摇号
      x-speakeasy-mcp:
        scopes:
          - read
        readOnlyHint: true
        openWorldHint: true
