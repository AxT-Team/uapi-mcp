  /network/whois:
    get:
      tags:
        - Network
      summary: 查询域名的WHOIS注册信息
      description: |-
        想知道一个域名是什么时候注册的、注册商是谁、什么时候到期？WHOIS信息可以告诉你这一切。

        ## 功能概述
        这是一个在线的WHOIS查询工具。你可以通过如下两种方式获取WHOIS信息：

        - **默认行为**（不带参数）：`GET /api/v1/network/whois?domain=google.com`
          - 返回一个JSON对象，`whois` 字段为原始、未处理的WHOIS文本字符串。
        - **JSON格式化**：`GET /api/v1/network/whois?domain=google.com&format=json`
          - 返回一个JSON对象，`whois` 字段为解析后的JSON对象，包含WHOIS信息中的键值对。

        这样你既可以获得最全的原始信息，也可以方便地处理结构化数据。
      operationId: get-network-whois
      parameters:
        - name: domain
          in: query
          required: true
          description: 你需要查询WHOIS信息的域名。
          schema:
            type: string
            example: google.com
          x-tooltip: "例如: google.com"
        - name: format
          in: query
          required: false
          description: 返回格式。留空或为 'text' 时返回原始WHOIS文本，设为 'json' 时返回结构化JSON。
          schema:
            type: string
            enum:
              - text
              - json
            default: text
            example: json
          x-tooltip: 可选，'json' 返回结构化数据，默认返回原始文本
      responses:
        "200":
          description: 查询成功！根据 format 参数返回原始WHOIS文本或结构化JSON。
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      whois:
                        type: string
                        description: |-
                          **WHOIS原始文本**

                          返回未经处理的原始WHOIS查询结果文本。
                        example: |-
                          Domain Name: GOOGLE.COM
                          Registry Domain ID: 2138514_DOMAIN_COM-VRSN
                          Registrar WHOIS Server: whois.markmonitor.com
                          ...
                    description: >-
                      ### 文本格式响应

                      当 `format=text` 或未指定时，`whois` 字段包含原始的WHOIS查询文本。这保留了最完整的信息，适合需要自行解析或展示原始数据的场景。
                  - type: object
                    properties:
                      whois:
                        type: object
                        description: |-
                          ### 结构化WHOIS信息

                          返回经过解析的JSON对象，包含以下主要部分：

                          - **域名信息**: 包含域名ID、注册状态、DNS服务器等
                          - **注册商信息**: 注册服务商的详细信息
                          - **注册人信息**: 域名所有者的相关信息（可能因隐私保护而部分隐藏）
                          - **重要日期**: 包括注册日期、更新日期和到期日期
                        example:
                          domain:
                            id: 12345678901234
                            domain: exa***.com
                            punycode: exa***.com
                            name: exa***
                            extension: com
                            whois_server: whois.***.com
                            status:
                              - ok
                            name_servers:
                              - ns1.***.com
                              - ns2.***.com
                            created_date: 2022-01-01T00:00:00Z
                            updated_date: 2024-01-01T00:00:00Z
                            expiration_date: 2026-01-01T00:00:00Z
                          registrar:
                            id: 9999
                            name: "*** Registrar LLC"
                            phone: +86.1*********
                            email: redacted@***.com
                          registrant:
                            id: Not Available From Registry
                            name: REDACTED FOR PRIVACY
                            organization: REDACTED FOR PRIVACY
                            country: CN
                    description: >-
                      ### JSON格式响应

                      当 `format=json` 时，`whois` 字段返回结构化的JSON对象。


                      > [!NOTE]

                      > **注意**：返回的具体字段可能因域名注册局和隐私保护设置而异。某些敏感信息可能会被部分隐藏或标记为 `REDACTED FOR PRIVACY`。
        "400":
          description: 请求参数无效。请检查 `domain` 参数是否提供且格式正确。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INVALID_ARGUMENT
                  details:
                    type: object
                  message:
                    type: string
                    example: Missing or invalid 'domain' parameter.
        "404":
          description: 查询失败或域名不存在。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: NOT_FOUND
                  details:
                    type: object
                  message:
                    type: string
                    example: WHOIS information not found for the domain.
      x-search-words:
