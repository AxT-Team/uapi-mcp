  /random/image:
    get:
      tags:
        - Random
      summary: 随机图片
      description: >
        需要一张随机图片作为占位符或者背景吗？这个接口是你的不二之选。


        ## 功能概述

        这是一个非常简单的接口，它会从我们庞大的图库和精选外部图床中随机挑选一张图片，然后通过 302 重定向让你直接访问到它。这使得它可以非常方便地直接用在 HTML 的 `<img>` 标签中。


        你可以通过 `/api/v1/random/image?category=acg&type=4k` 这样的请求获取由UapiPro服务器提供的图片，也可以通过 `/api/v1/random/image?category=ai_drawing` 获取由外部图床精选的图片。


        如果你不提供任何 category 参数，程序会从所有图片（包括本地的和URL的）中随机抽取一张（**全局随机图片不包含ikun和AI绘画**）。


        > [!TIP]

        > 如果你需要更精确地控制图片类型，请使用 `/image/random/{category}/{type}` 接口。


        ### 支持的主类别与子类别

        - **acg**（二次元动漫）


            - pc
            - mb
        - **外部图床精选/混合动漫**


          - **landscape**: 风景图。
          - **anime**: 混合了UapiPro服务器的acg和外部图床的general_anime分类下的图片。
          - **pc_wallpaper**: 电脑壁纸。
          - **mobile_wallpaper**: 手机壁纸。
          - **general_anime**: 动漫图。
          - **ai_drawing**: AI绘画。
        - **其他分类**


          - **bq**（表情包/趣图）
            - eciyuan
            - ikun
            - xiongmao
            - waiguoren
            - maomao
          - **furry**（福瑞）
            - z4k
            - szs8k
            - s4k
            - 4k

        > [!NOTE]

        > 默认全局随机（未指定category参数）时，不会包含ikun和AI绘画（ai_drawing）类别的图片。

      operationId: get-random-image
      parameters:
        - name: category
          in: query
          required: false
          description: |
            （可选）指定图片主类别。

            **支持的主类别：**
            - `acg`（二次元动漫，UapiPro服务器）
            - `landscape`（风景图，外部图床）
            - `anime`（混合动漫）
            - `pc_wallpaper`（电脑壁纸，外部图床）
            - `mobile_wallpaper`（手机壁纸，外部图床）
            - `general_anime`（动漫图，外部图床）
            - `ai_drawing`（AI绘画，外部图床）
            - `bq`（表情包/趣图，UapiPro服务器）
            - `furry`（福瑞，UapiPro服务器）

            > [!TIP]
            > 如果不指定，将从所有图片中随机抽取（不包含 `ikun` 和 `ai_drawing`）。
          schema:
            type: string
            enum:
              - acg
              - landscape
              - anime
              - pc_wallpaper
              - mobile_wallpaper
              - general_anime
              - ai_drawing
              - bq
              - furry
            example: acg
            x-enumLabels:
              acg: 二次元
              landscape: 风景图
              anime: 混合动漫
              pc_wallpaper: 电脑壁纸
              mobile_wallpaper: 手机壁纸
              general_anime: 动漫图
              ai_drawing: AI绘画
              bq: 表情包
              furry: 福瑞
          x-tooltip: 可选，如 `furry`、`ai_drawing` 或 `anime`，可筛选图片主类别。
        - name: type
          in: query
          required: false
          description: |
            （可选，仅UapiPro服务器图片支持）指定图片子类别。

            - **bq**: `xiongmao`, `waiguoren`, `maomao`, `ikun`, `eciyuan`
            - **acg**: `pc`, `mb`
            - **furry**: `z4k`, `szs8k`, `s4k`, `4k`

            > [!TIP]
            > 外部图床类别和 `anime` 混合类别不支持 `type` 参数。
          schema:
            type: string
            enum:
              - pc
              - mb
              - eciyuan
              - ikun
              - 4k
              - s4k
              - z4k
              - szs8k
              - xiongmao
              - maomao
              - waiguoren
            example: pc
            x-enumLabels:
              pc: 电脑
              mb: 手机
              eciyuan: 二次元
              ikun: iKun
              4k: 4K
              s4k: 横屏4K
              z4k: 竖屏4K
              szs8k: 竖屏8K
              xiongmao: 熊猫
              maomao: 猫猫
              waiguoren: 外国人
          x-tooltip: 可选，如 `z4k`，进一步筛选UapiPro服务器图片子类别。
      responses:
        "200":
          description: 成功！将随机图片以图片二进制 (image/jpeg) 直接返回给客户端，可直接在 <img> 标签中使用。
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: 未找到指定类别的图片。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: NOT_FOUND
                  message:
                    type: string
                    example: 未找到指定类别的图片。
        "500":
          description: 服务器内部错误。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INTERNAL_SERVER_ERROR
                  message:
                    type: string
                    example: 选择随机图片时发生错误。
