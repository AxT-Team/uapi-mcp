          answer: 支持全球 243 个国家的城市数据（共 31,251 个城市），中国数据精确到省/市/区县/街道四级行政区划，共计 43,151 条记录。中国数据包含 adcode 行政编码、citycode 城市区号等字段，国际城市额外提供人口和时区数据。
        - question: 三种查询模式有什么区别？怎么选择？
          answer: 接口根据传入参数自动选择模式，无需手动指定：传 adcode 走精确查询并返回下级区划（如传省级 adcode 返回所有市）；传 lat+lng 走坐标反查返回附近地点；传 keywords 走关键词搜索支持中英文。必须至少传入一种查询参数。
        - question: 如何用这个API实现省市区街道四级联动？
          answer: 先不传参数获取省级列表，用户选择省后传该省 adcode 获取市列表，选择市后传市 adcode 获取区县列表，选择区县后传区县 adcode 获取街道列表。每次传入上级 adcode 即可获取下级行政区划。
        - question: 坐标反查需要注意什么？
          answer: lat（纬度）和 lng（经度）必须同时传入，否则返回 400 错误。返回结果按距离排序，可通过 limit 参数控制返回数量（默认20，最大100）。
        - question: 这个API需要注册或申请密钥吗？
          answer: 不需要。完全免费，无需注册、无需 API 密钥，直接发送 HTTP GET 请求即可调用。响应默认缓存 6 小时。
        - question: 中国数据和国际城市数据返回的字段有什么区别？
          answer: 中国数据包含 adcode（行政编码）、citycode（城市区号）、city、district、street 等字段，支持四级行政区划逐级查询；国际城市数据包含 population（人口）和 timezone（时区，如 Asia/Tokyo）字段，但没有 adcode 等中国特有字段。两者都包含 name、level、country、country_code、province、center 坐标等通用字段。
        - question: 部分城市为什么没有区县层级？
          answer: 部分城市和省直辖县因为没有区县的概念，在市级下方直接显示街道。例如广东东莞、海南文昌市等。此外，街道级别返回的 adcode 是所属区县的 adcode。
      x-speakeasy-mcp:
        scopes:
          - read
        readOnlyHint: true
        openWorldHint: true
