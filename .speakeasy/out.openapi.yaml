  /misc/holiday-calendar:
    get:
      tags:
        - Misc
      summary: 查询节假日与万年历
      description: >-
        查询指定日期、月份或年份的万年历与节假日信息。


        ## 功能概述

        这个接口支持三种查询方式：按天（`date`）、按月（`month`）和按年（`year`）。调用时三者选一个传入即可。


        如果你只关心某一类事件，可以通过 `holiday_type` 进行筛选，例如只看法定休假/调休、公历节日、农历节日或节气。


        在 `date` 模式下，传 `include_nearby=true` 可以额外返回该日期前后最近的节日；返回数量由 `nearby_limit` 控制，默认 7，最大 30。
      operationId: get-misc-holiday-calendar
      parameters:
        - name: date
          in: query
          required: false
          description: 按天查询时填写这个参数，例如查某一天。格式：`YYYY-MM-DD`。和 `month`、`year` 三选一。
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
            example: '2025-10-01'
          x-tooltip: 三选一：按天查询时填写 YYYY-MM-DD。
        - name: month
          in: query
          required: false
          description: 按月查询时填写这个参数，例如查某个月。格式：`YYYY-MM`。和 `date`、`year` 三选一。
          schema:
            type: string
            pattern: ^\d{4}-\d{2}$
          x-tooltip: 三选一：按月查询时填写 YYYY-MM。
        - name: year
          in: query
          required: false
          description: 按年查询时填写这个参数，例如查某一年。格式：`YYYY`。和 `date`、`month` 三选一。
          schema:
            type: string
            pattern: ^\d{4}$
          x-tooltip: 三选一：按年查询时填写 YYYY。
        - name: timezone
          in: query
          required: false
          description: 时区名称，默认 Asia/Shanghai。
          schema:
            type: string
            default: Asia/Shanghai
            example: Asia/Shanghai
          x-tooltip: 推荐传 IANA 时区名。
        - name: holiday_type
          in: query
          required: false
          description: 节日筛选类型，默认 all。
          schema:
            type: string
            default: all
            enum:
              - all
              - legal
              - legal_rest
              - legal_workday
              - solar
              - lunar
              - term
            example: legal
            x-enumLabels:
              all: 全部节日类型
              legal: 法定相关（休假 + 调休上班）
              legal_rest: 仅法定休假日
              legal_workday: 仅法定调休上班日
              solar: 仅公历节日
              lunar: 仅农历节日
              term: 仅节气
          x-tooltip: 不传就是 all；新手可先不传。
        - name: include_nearby
          in: query
          required: false
          description: 是否返回前后最近节日，仅 date 模式生效，默认 false。month/year 模式会忽略此参数。
          schema:
            type: boolean
            enum:
              - false
              - true
            default: false
            example: true
            x-enumLabels:
              "false": 不返回前后节日（默认）
              "true": 返回前后最近节日
          x-tooltip: 想看前后节日时设为 true（仅 date 模式）。
        - name: nearby_limit
          in: query
          required: false
          description: 返回最近节日数量限制，默认 7，最大 30。仅 date 模式 + include_nearby=true 生效。
          schema:
            type: integer
