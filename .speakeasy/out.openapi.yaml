  /misc/lunartime:
    get:
      tags:
        - Misc
      summary: 查询农历时间
      description: >-
        需要在指定时区下查看某个时间点的农历信息？这个接口可以直接返回完整结果。


        ## 功能概述

        支持传入 Unix 时间戳（秒或毫秒）和 IANA 时区名，返回公历时间、星期、农历年月日、干支、生肖、节气与节日信息。不传 `ts` 时默认使用当前时间，不传 `timezone` 时默认 `Asia/Shanghai`。


        ## 时区说明

        - 支持标准 IANA 时区，例如 `Asia/Shanghai`、`Asia/Tokyo`

        - 也支持别名：`Shanghai`、`Beijing`

        - 时区非法时返回 400 并提示 `invalid timezone: xxx`
      operationId: get-misc-lunartime
      parameters:
        - name: ts
          in: query
          required: false
          description: Unix 时间戳，支持 10 位秒级或 13 位毫秒级。不传则默认当前时间。
          schema:
            type: string
            example: "1707537600"
          x-tooltip: 支持秒和毫秒时间戳。
        - name: timezone
          in: query
          required: false
          description: 时区名称。支持 IANA 时区（如 Asia/Shanghai）和别名（Shanghai、Beijing）。默认 Asia/Shanghai。
          schema:
            type: string
            example: Asia/Shanghai
          x-tooltip: 推荐使用 IANA 时区名。
      responses:
        "200":
          description: 查询成功，返回指定时间和时区下的农历信息。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 业务状态码，200 表示成功。
                    example: 200
                  message:
                    type: string
                    description: 状态描述。
                    example: success
                  data:
                    type: object
                    description: 万年历查询结果。
                    properties:
                      query_timestamp:
                        type: string
                        description: 原始 ts 入参。
                        example: "1707537600"
                      query_timezone:
