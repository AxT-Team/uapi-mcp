  /social/bilibili/liveroom:
    get:
      tags:
        - Social
      summary: 查询 B站直播间
      description: >-
        想知道你喜欢的主播开播了吗？或者想在你的应用里集成B站直播间状态？这个接口能满足你。


        ## 功能概述

        这是一个智能接口，你可以用主播的 `mid` (用户ID) 或者直播间的 `room_id` (长号或短号)来查询。它会返回直播间的详细信息，包括是否在直播、标题、封面、人气、分区等。


        ## 响应体字段说明

        - **`live_status` (直播状态)**: `0` 代表未开播，`1` 代表直播中，`2` 代表轮播中。
      operationId: get-social-bilibili-liveroom
      parameters:
        - name: mid
          in: query
          required: false
          description: 主播的用户ID (`mid`)。与 `room_id` 任选其一。
          schema:
            type: string
            example: "672328094"
        - name: room_id
          in: query
          required: false
          description: 直播间ID，可以是长号（真实ID）或短号（靓号）。与 `mid` 任选其一。
          schema:
            type: string
            example: "22637261"
          x-tooltip: "例如: 22637261 (嘉然今天吃什么)"
      responses:
        "200":
          description: 成功！返回直播间的详细信息。
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid:
                    type: number
                    description: 主播的用户ID (mid)。
                    example: 672328094
                  room_id:
                    type: number
                    description: 直播间的真实房间号（长号）。
                    example: 22637261
                  short_id:
                    type: number
                    description: 直播间的短号（靓号）。如果没有设置，则为0。
                    example: 22625027
                  attention:
                    type: number
                    description: 主播的粉丝数（关注数量）。
                    example: 1789089
                  online:
                    type: number
                    description: 直播间当前的人气值。注意这不是真实在线人数。
                    example: 3662242
                  live_status:
                    type: number
                    description: 直播状态。0:未开播, 1:直播中, 2:轮播中。
                    example: 1
                  area_id:
                    type: number
                    description: 分区ID。
                    example: 372
                  parent_area_name:
                    type: string
                    description: 父分区名称。
                    example: 虚拟主播
                  area_name:
                    type: string
                    description: 子分区名称。
                    example: 虚拟偶像
                  background:
                    type: string
                    description: 直播间背景图的URL。
                    example: http://i0.hdslb.com/bfs/live/room_bg/672328094.jpg
                  title:
                    type: string
                    description: 当前直播间的标题。
                    example: 【B限】杂谈~来聊聊天吧~
                  user_cover:
                    type: string
                    description: 用户设置的直播间封面URL。
                    example: http://i0.hdslb.com/bfs/live/user_cover/672328094.jpg
                  description:
                    type: string
                    description: 直播间公告或描述，支持换行符。
                    example: 这里是嘉然的直播间，欢迎回家！
                  live_time:
                    type: string
                    description: 本次直播开始的时间，格式为 `YYYY-MM-DD HH:mm:ss`。如果未开播，则为空字符串。
                    example: 2023-10-27 20:00:00
                  tags:
                    type: string
                    description: 直播间设置的标签，以逗号分隔。
                    example: VUP,虚拟偶像,A-SOUL,嘉然
                  hot_words:
                    type: array
                    description: 直播间热词列表，通常用于弹幕互动。
                    items:
                      type: string
                      example: 嘉门
                  new_pendants:
                    type: object
                    description: 主播佩戴的头像框、大航海等级等信息，结构可能比较复杂。
                    properties: {}
      x-search-words:
