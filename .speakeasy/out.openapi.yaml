  /misc/date-diff:
    post:
      tags:
        - Misc
      summary: 计算两个日期之间的时间差值
      description: >-
        想知道两个日期之间相差多久？这个接口帮你精确计算时间差值。


        ## 功能概述

        输入开始日期和结束日期，返回它们之间的时间差，包括总天数、总小时数、总分钟数、总秒数、总周数，以及人性化显示格式（如"1年2月3天"）。


        ## 日期格式

        接口支持自动识别常见日期格式，包括：YYYY-MM-DD、YYYY/MM/DD、DD-MM-YYYY、ISO 8601（带时区）等。也可以通过`format`参数显式指定格式（如DD-MM-YYYY）。


        > [!NOTE]

        > 当结束日期早于开始日期时，返回的数值为负数。
      operationId: post-misc-date-diff
      parameters: []
      responses:
        "200":
          description: 计算成功，返回多种单位的时间差值
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: integer
                    description: 总天数
                    example: 364
                  hours:
                    type: integer
                    description: 总小时数
                    example: 8736
                  minutes:
                    type: integer
                    description: 总分钟数
                    example: 524160
                  seconds:
                    type: integer
                    description: 总秒数
                    example: 31449600
                  weeks:
                    type: integer
                    description: 总周数
                    example: 52
                  human_readable:
                    type: string
                    description: 人性化显示格式
                    example: 52周 0天
        "400":
          description: 日期解析失败或参数错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                    example: DATE_PARSE_ERROR
                  error_message:
                    type: string
                    example: "解析开始日期失败: 无法识别日期格式: invalid-date"
                  error_details:
                    type: string
                    example: ""
      requestBody:
        description: 包含日期信息的JSON对象
        required: true
        content:
          application/json:
            schema:
              required:
                - start_date
                - end_date
              type: object
              properties:
                start_date:
                  type: string
                  description: 开始日期，支持多种格式自动识别
                  example: 2025-01-01
                end_date:
                  type: string
                  description: 结束日期，支持多种格式自动识别
                  example: 2025-12-31
                format:
                  type: string
                  description: 日期格式（可选），如DD-MM-YYYY。不指定则自动识别
                  example: YYYY-MM-DD
      x-search-words:
