  /random/string:
    get:
      tags:
        - Random
      summary: 随机字符串
      description: |-
        无论是需要生成一个安全的随机密码、一个唯一的Token，还是一个简单的随机ID，这个接口都能满足你。

        ## 功能概述
        你可以精确地控制生成字符串的长度和字符集类型，非常灵活。

        ## 使用须知

        > [!TIP]
        > **字符集类型 `type` 详解**
        > 你可以通过 `type` 参数精确控制生成的字符集：
        > - **`numeric`**: 纯数字 (0-9)
        > - **`lower`**: 纯小写字母 (a-z)
        > - **`upper`**: 纯大写字母 (A-Z)
        > - **`alpha`**: 大小写字母 (a-zA-Z)
        > - **`alphanumeric`** (默认): 数字和大小写字母 (0-9a-zA-Z)
        > - **`hex`**: 十六进制字符 (0-9a-f)
      operationId: get-random-string
      parameters:
        - name: length
          in: query
          required: false
          description: 你希望生成的字符串的长度。有效范围是 1 到 1024。
          schema:
            type: integer
            default: 16
            example: 32
          x-tooltip: 默认为16，最大1024。
        - name: type
          in: query
          required: false
          description: 指定构成字符串的字符类型。
          schema:
            type: string
            default: alphanumeric
            enum:
              - numeric
              - lower
              - upper
              - alpha
              - alphanumeric
              - hex
            example: alphanumeric
            x-enumLabels:
              numeric: 纯数字
              lower: 小写字母
              upper: 大写字母
              alpha: 大小写字母
              alphanumeric: 字母+数字
              hex: 十六进制
          x-tooltip: 默认为'alphanumeric' (数字+字母)。
      responses:
        "200":
          description: 生成成功！
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                    example: aK3fP7bQ9zRjT1vN
        "400":
          description: 无效的请求参数。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INVALID_ARGUMENT
                  details:
                    type: object
                  message:
                    type: string
                    example: Invalid parameter, e.g., length out of range [1, 1024].
        "500":
          description: 服务器内部错误。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INTERNAL_SERVER_ERROR
                  details:
                    type: object
                  message:
                    type: string
                    example: Failed to generate random string.
      x-search-words:
        - 随机字符串
        - 密码生成
        - token
        - 随机id
        - random string
        - password
        - generator
        - key
