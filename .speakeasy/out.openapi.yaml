        - mc
        - 我的世界
        - 曾用名
        - 历史用户名
        - 改名记录
        - uuid
        - 玩家查询
        - mojang
        - id
        - name
        - 用户名
      x-seo-optimized-text: 免费Minecraft玩家曾用名查询API，我的世界历史用户名追溯接口。通过用户名或UUID查询玩家所有历史名称及变更时间。稳定可靠的MC玩家历史数据API服务，适用于服务器管理、玩家识别、社区运营等场景。
      x-seo-keywords:
