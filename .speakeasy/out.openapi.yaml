  /image/compress:
    post:
      tags:
        - Image
      summary: 无损压缩图片
      description: >-
        还在为图片体积和加载速度发愁吗？体验一下我们强大的**无损压缩服务**，它能在几乎不牺牲任何肉眼可感知的画质的前提下，将图片体积压缩到极致。


        ## 功能概述

        你只需要上传一张常见的图片（如 PNG, JPG），选择一个压缩等级，就能获得一个体积小到惊人的压缩文件。这对于需要大量展示高清图片的网站、App 或小程序来说，是优化用户体验、节省带宽和存储成本的利器。


        ## 使用须知

        > [!TIP]

        > 为了给您最好的压缩效果，我们的算法需要进行复杂计算，处理时间可能会稍长一些，请耐心等待。


        > [!WARNING]

        > **服务排队提醒**

        > 这是一个计算密集型服务。在高并发时，您的请求可能会被排队等待处理。如果您需要将其集成到对延迟敏感的生产服务中，请注意这一点。


        ### 请求与响应格式

        - 请求必须使用 `multipart/form-data` 格式上传文件。

        - 成功响应将直接返回压缩后的文件二进制流 (`image/*`)，并附带 `Content-Disposition` 头，建议客户端根据此头信息保存文件。


        ## 参数详解

        ### `level` (压缩等级)

        这是一个从 `1` 到 `5` 的整数，它决定了压缩的强度和策略，数字越小，压缩率越高。所有等级都经过精心调校，以在最大化压缩率的同时保证出色的视觉质量。

        - `1`: **极限压缩** (推荐，体积最小，画质优异)

        - `2`: **高效压缩**

        - `3`: **智能均衡** (默认选项)

        - `4`: **画质优先**

        - `5`: **专业保真** (压缩率稍低，保留最多图像信息)


        ## 错误处理指南

        - **400 Bad Request**: 通常因为没有上传文件，或者 `level` 参数不在 1-5 的范围内。

        - **500 Internal Server Error**: 如果在压缩过程中服务器发生内部错误，会返回此状态码。
      operationId: post-image-compress
      parameters:
        - name: level
          in: query
          required: false
          description: 压缩强度 (1-5)，默认为 3。数字越小，压缩率越高。
          schema:
            type: integer
            default: 3
            enum:
              - 1
              - 2
              - 3
              - 4
              - 5
            example: 3
          x-tooltip: |-
            - `1`: **极限压缩** (推荐)
            - `2`: **高效压缩**
            - `3`: **智能均衡** (默认)
            - `4`: **画质优先**
            - `5`: **专业保真**
        - name: format
          in: query
          required: false
          description: 输出图片格式，可以是 'png' 或 'jpeg'。
          schema:
            type: string
            default: png
            enum:
              - png
              - jpeg
            example: png
          x-tooltip: 默认为 'png'。
      responses:
        "200":
          description: 压缩成功响应。响应是压缩后的图片二进制数据。`Content-Type` 依据选择的目标格式，默认为 image/png。
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="compressed.png"
              description: 提示客户端文件下载为压缩后的文件。建议扩展名与输出格式一致。
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: 请求无效。可能是未上传文件、文件格式不受支持或参数错误。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: 机器可读的错误代码。
                    example: INVALID_ARGUMENT
                  message:
                    type: string
                    description: 人类可读的错误描述信息。
                    example: Level must be between 1 and 5.
        "500":
          description: 服务器内部错误。压缩过程中发生错误。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: 机器可读的错误代码。
                    example: COMPRESSION_FAILED
                  message:
                    type: string
                    description: 人类可读的错误描述信息。
                    example: An internal error occurred during image compression.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 支持PNG, JPG, JPEG等常见图片格式。文件大小不超过15MB。
                  x-accept: .png,.jpg,.jpeg
              required:
                - file
      x-search-words:
        - 图片压缩
        - 无损压缩
        - 图片优化
        - 减小体积
        - image compression
        - lossless
        - optimize
        - png
        - jpg
      x-speakeasy-mcp:
        scopes:
          - read
        readOnlyHint: true
        openWorldHint: true
