                              example: false
                            is_rest_day:
                              type: boolean
                              description: 是否为休息日。
                              example: true
                            is_holiday:
                              type: boolean
                              description: 当天是否存在节日/节气/法定事件。
                              example: true
                            legal_holiday_name:
                              type: string
                              description: 法定节假日名称，无则为空。
                              example: 国庆节
                            legal_holiday_type:
                              type: string
                              description: 法定假日类型：rest 或 workday_adjust。
                              example: rest
                            solar_festival:
