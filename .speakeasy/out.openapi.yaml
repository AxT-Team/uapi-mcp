        scopes:
          - read
        readOnlyHint: true
        openWorldHint: true
  /misc/district:
    get:
      tags:
        - Misc
      summary: Adcode 国内外行政区域查询
      description: >-
        一个接口，覆盖全球 243 个国家、中国省/市/区/街道四级行政区划，支持关键词搜索、行政编码查询、坐标反查三种查询模式（必须至少传入一种查询参数）。


        ## 功能概述

        根据用户输入的搜索条件快速查找行政区域信息。例如：中国 > 山东省 > 济南市 > 历下区 > 舜华路街道。


        无需注册、无需密钥，直接调用即可获取结构化的行政区域数据。支持三种查询方式：

        - 传 `adcode`，按行政编码精确查询，同时返回下级区划列表

        - 传 `lat` + `lng`，坐标反查附近地点

        - 传 `keywords`，按关键词搜索，支持中英文


        ## 中国与国际数据差异

        中国数据包含 `adcode`、`citycode` 等字段，支持省/市/区/街道四级逐级查询；国际城市数据不含这些字段，但额外提供 `population`（人口）和 `timezone`（时区）。


        > [!NOTE]

        > 部分城市（如东莞、文昌）没有区县层级，市级下方直接显示街道。街道级别的 `adcode` 返回的是所属区县的 `adcode`。
      operationId: get-misc-district
      parameters:
        - name: keywords
          in: query
          required: false
          description: 关键词搜索（城市名、区县名，支持中英文）。
          schema:
            type: string
            example: 上海
          x-tooltip: 支持中英文城市名搜索，如「上海」「London」。
        - name: adcode
          in: query
          required: false
          description: 中国行政区划代码精确查询（如 `110000`），同时返回下级行政区。
          schema:
            type: string
            example: "110000"
          x-tooltip: 传入 adcode 时优先级最高，返回该区划及下级列表。
        - name: lat
          in: query
          required: false
          description: 纬度，与 `lng` 配合使用，坐标反查附近地点。
          schema:
            type: number
            example: 39.9
          x-tooltip: 必须与 lng 同时传入。
        - name: lng
          in: query
          required: false
          description: 经度，与 `lat` 配合使用。
          schema:
            type: number
            example: 116.4
          x-tooltip: 必须与 lat 同时传入。
        - name: level
          in: query
          required: false
          description: 过滤行政级别。
          schema:
            type: string
            enum:
              - province
              - city
              - district
              - street
            x-enumLabels:
              province: 省/直辖市/自治区
              city: 市/地级
              district: 区/县
              street: 街道/乡镇
          x-tooltip: 可选值：province / city / district / street。
        - name: country
          in: query
          required: false
          description: 过滤国家代码（ISO 3166-1 alpha-2），如 `CN`、`JP`、`US`、`GB`。
          schema:
            type: string
            example: CN
          x-tooltip: ISO 3166-1 alpha-2 国家代码。
        - name: limit
          in: query
          required: false
          description: 返回数量上限，默认 `20`，最大 `100`。
          schema:
            type: integer
            default: 20
            maximum: 100
            example: 20
          x-tooltip: 默认 20，最大 100。
      responses:
        "200":
          description: 查询成功！返回匹配的行政区域列表。
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: 结果总数。
                    example: 2
                  results:
                    type: array
                    description: 结果列表。
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: 地区名称。
                          example: 北京市
                        level:
                          type: string
                          description: 行政级别：province / city / district / street。
                          example: province
                        country:
                          type: string
                          description: 国家名称。
                          example: 中国
                        country_code:
                          type: string
                          description: ISO 3166-1 alpha-2 国家代码。
                          example: CN
                        province:
                          type: string
                          description: 省/州（中国数据）或一级行政区（国际数据）。
                          example: 北京市
                        city:
                          type: string
                          description: 市（仅中国数据）。
                          example: 北京市
                        district:
                          type: string
                          description: 区/县（仅中国数据）。
                          example: 朝阳区
                        street:
                          type: string
                          description: 街道/乡镇（仅中国数据）。
                          example: 三里屯街道
                        adcode:
                          type: string
                          description: 行政区划代码（仅中国数据）。
                          example: "110000"
                        citycode:
                          type: string
                          description: 城市区号（仅中国数据）。
                          example: "010"
                        center:
                          type: object
                          description: 中心点坐标。
                          properties:
                            lat:
                              type: number
                              example: 39.904987
                            lng:
                              type: number
                              example: 116.405289
                        population:
                          type: integer
                          description: 人口（仅国际城市数据）。
                          example: 8336599
                        timezone:
                          type: string
                          description: 时区（仅国际城市数据），如 Asia/Tokyo。
                          example: Asia/Tokyo
        "400":
          description: 请求参数错误。
          content:
