      description: "想要获取UP主的所有投稿视频？或者想在你的应用里展示创作者的作品集？这个接口能帮你轻松实现。\n\n## 功能概述\n通过用户的 `mid`（用户ID），你可以获取该UP主的投稿视频列表。接口支持关键词搜索、分页加载和多种排序方式，让你能够灵活地展示和分析创作者的内容。\n\n## 参数说明\n- **`mid` (用户ID)**: B站用户的mid，必填参数。\n- **`keywords` (搜索关键词)**: 可选，用于在该UP主的投稿中搜索特定关键词。\n- **`orderby` (排序方式)**: \n  - `pubdate`: 按最新发布排序（默认）\n  - `views`: 按最多播放排序\n- **`ps` (每页条数)**: 默认20条。\n- **`pn` (页码)**: 默认1，用于分页。\n\n## 响应体字段说明\n- **`total` (总稿件数)**: UP主的投稿总数。\n- **`page` (当前页码)**: 当前返回的页码。\n- **`size` (每页数量)**: 每页返回的视频数量。\n- **`videos` (视频列表)**: 包含当前页的所有视频信息：\n  - `aid`: 视频的AV号\n  - `bvid`: 视频的BV号\n  - `title`: 视频标题\n  - `cover`: 封面URL\n  - `duration`: 时长（秒）\n  - `play_count`: 播放量\n  - `publish_time`: 发布时间戳\n  - `create_time`: 创建时间戳\n  - `state`: 视频状态\n  - `is_ugc_pay`: 是否付费视频（0=免费，1=付费）\n  - `is_interactive`: 是否为互动视频"
      operationId: get-social-bilibili-archives
      parameters:
        - name: mid
          in: query
          required: true
          description: B站用户的mid（用户ID）
