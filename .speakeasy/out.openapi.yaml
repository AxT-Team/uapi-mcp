  /text/aes/decrypt:
    post:
      tags:
        - Text
      summary: AES 解密
      description: "收到了用AES加密的密文？把它、密钥和随机数（nonce）交给我们，就能还原出原始内容。\n\n## 功能概述\n这是一个标准的AES解密接口。你需要提供经过Base64编码的密文、加密时使用的密钥和nonce（随机数，通常为16字节字符串）。\n\n> [!IMPORTANT]\n> **关于密钥 `key`**\n> 我们支持 AES-128, AES-192, 和 AES-256。请确保你提供的密钥 `key` 的长度（字节数）正好是 **16**、**24** 或 **32**，以分别对应这三种加密强度。\n> \n> **关于随机数 `nonce`**\n> 通常为16字节字符串，需与加密时一致。"
      operationId: post-text-aes-decrypt
      parameters: []
      responses:
        "200":
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                properties:
                  plaintext:
                    type: string
                    example: top secret message
        "400":
          description: 无效的请求参数
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: INVALID_ARGUMENT
                  details:
                    type: object
                  message:
                    type: string
                    example: Invalid key length, invalid Base64 text, or missing nonce.
        "500":
          description: 解密失败
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: DECRYPTION_FAILED
                  details:
                    type: object
                  message:
                    type: string
                    example: Decryption failed, likely due to an incorrect key, nonce, or corrupted ciphertext.
      requestBody:
        description: 包含待解密文本 'text'、密钥 'key' 和随机数 'nonce' 的JSON对象
        required: true
        content:
          application/json:
            schema:
              required:
                - key
                - text
                - nonce
              type: object
              properties:
                key:
                  type: string
                  description: 密钥，长度必须为16、24或32字节，对应AES-128/192/256。
                  example: a-secret-key-123
                text:
                  type: string
                  description: Base64编码的密文。
                  example: uyzVKczxZi3HdoGfeuaAt4F2/20WSmwFzIhJWMmDIaxeu97nLqbsX3wdp+NnRw==
                nonce:
                  type: string
                  description: 16字节的IV/Nonce，必须为16个字符
                  example: 1234567890abcdef
      x-search-words:
