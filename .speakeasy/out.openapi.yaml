            x-enumLabels:
              "false": 不返回逐小时预报（默认）
              "true": 返回逐小时预报
          x-tooltip: 设为 true 获取逐小时预报
        - name: minutely
          in: query
          required: false
          description: 返回分钟级降水预报（仅国内城市），每5分钟一个数据点，共24个。
          schema:
