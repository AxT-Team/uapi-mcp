  /misc/tracking/detect:
    get:
      tags:
        - Misc
      summary: 识别快递公司
      description: >-
        不确定手里的快递单号属于哪家快递公司？这个接口专门做识别，不查物流。


        > [!VIP]

        > 本API目前处于**限时免费**阶段，我们鼓励开发者集成和测试。未来，它将转为付费API，为用户提供更稳定和强大的服务。


        ## 功能概述

        输入快递单号，系统会根据单号规则快速识别出最可能的快递公司。如果存在多个可能的匹配结果，还会在 `alternatives` 字段中返回备选项，供你参考选择。


        ## 使用须知

        - **识别速度快**：只做规则匹配，不查询物流信息，响应速度通常在100ms内

        - **准确率高**：基于各快递公司的单号规则进行智能识别，准确率超过95%

        - **备选方案**：当单号规则可能匹配多家快递公司时，会提供所有可能的选项
      operationId: get-misc-tracking-detect
      parameters:
        - name: tracking_number
          in: query
          required: true
          description: 需要识别的快递单号。
          schema:
            type: string
          x-tooltip: 输入完整的快递单号
      responses:
        "200":
          description: 识别成功！返回识别结果和可能的备选项。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
                    example: 操作成功
                  data:
                    type: object
                    properties:
                      tracking_number:
                        type: string
                        description: 查询的快递单号
                        example: SF1234567890123
                      carrier_code:
                        type: string
                        description: 最可能的快递公司编码
                        example: shunfeng
                      carrier_name:
                        type: string
                        description: 最可能的快递公司名称
                        example: 顺丰速运
                      alternatives:
                        type: array
                        description: 其他可能的快递公司列表（如果存在）
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                              description: 快递公司编码
                              example: ems
                            name:
                              type: string
                              description: 快递公司名称
                              example: EMS
        "404":
          description: 无法识别该快递单号。
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: NO_MATCH
                  message:
                    type: string
                    example: 无法识别该快递单号
      x-search-words:
        - 快递识别
        - 识别快递
        - 快递公司
        - 快递单号识别
        - detect
        - carrier
        - 快递判断
      x-speakeasy-mcp:
        scopes:
          - read
        readOnlyHint: true
        openWorldHint: true
