              - true
            x-enumLabels:
              "false": 不返回预报数据（默认）
              "true": 返回多天预报
          x-tooltip: 设为 true 获取最多7天天气预报
        - name: hourly
          in: query
          required: false
          description: 返回逐小时预报（24小时），含温度、天气、风向风速、湿度、降水概率等。
          schema:
            type: boolean
            enum:
              - false
